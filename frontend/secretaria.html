<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISLA Santarém — Secretaria Virtual</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script>if(localStorage.getItem('darkMode')==='1')document.documentElement.setAttribute('data-dark','1');</script>
  <style>
    /* ── Secretaria-specific overrides ── */
    .sec-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .sec-badge.docs  { background: #e8f5e9; color: #2e7d32; }
    .sec-badge.web   { background: #e3f2fd; color: #1565c0; }
    .sec-badge.geral { background: #f3e5f5; color: #6a1b9a; }
    [data-dark] .sec-badge.docs  { background: #1b3a1f; color: #81c784; }
    [data-dark] .sec-badge.web   { background: #0d2137; color: #64b5f6; }
    [data-dark] .sec-badge.geral { background: #2d1b3d; color: #ce93d8; }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      background: var(--bg-elevated, #f0f2f5);
      color: var(--text-muted, #666);
      margin-top: 6px;
      margin-right: 4px;
    }
    [data-dark] .source-pill { background: #2a2d35; color: #aaa; }

    .sec-topbar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary, #1a1a2e);
    }
    [data-dark] .sec-topbar-title { color: #e8e9f0; }
    .sec-topbar-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .sec-topbar-icon svg { color: #fff; }

    .sec-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 40px 20px;
      text-align: center;
    }
    .sec-welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .sec-welcome-icon svg { color: #fff; }
    .sec-welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary, #1a1a2e);
      margin: 0;
    }
    [data-dark] .sec-welcome h2 { color: #e8e9f0; }
    .sec-welcome p {
      font-size: 14px;
      color: var(--text-muted, #666);
      max-width: 420px;
      line-height: 1.6;
      margin: 0;
    }
    .sec-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 520px;
    }
    .sec-suggestion {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border, #e2e4e9);
      background: var(--bg-card, #fff);
      color: var(--text-primary, #1a1a2e);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .sec-suggestion:hover {
      border-color: #1565c0;
      color: #1565c0;
      background: #e3f2fd;
    }
    [data-dark] .sec-suggestion {
      background: #1e2130; border-color: #333; color: #c8cadf;
    }
    [data-dark] .sec-suggestion:hover {
      border-color: #64b5f6; color: #64b5f6; background: #0d2137;
    }

    .web-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #1565c0;
      margin-top: 4px;
    }
    [data-dark] .web-indicator { color: #64b5f6; }
  </style>
</head>
<body>

<div class="app">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="assets/images/islasantarem-inverse.svg" alt="ISLA Santarém" />
      </div>
      <div class="sidebar-tagline">Secretaria Virtual</div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span class="new-chat-btn-text">Nova Conversa</span>
      </button>
    </div>

    <div class="history-scroll" id="historyScroll">
      <div id="historyList">
        <div class="history-empty">A carregar...</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <!-- Nav links -->
      <div style="padding: 8px 12px; border-bottom: 1px solid var(--border, #e2e4e9);">
        <a href="/chat.html" style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted,#666);text-decoration:none;padding:6px 0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          Assistente Académico
        </a>
      </div>
      <div class="user-profile">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">...</div>
          <div class="user-role" id="userRole">Estudante</div>
        </div>
        <button onclick="logout()" title="Terminar sessão" class="logout-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/>
          </svg>
        </button>
        <div class="topbar-brand">
          <img src="assets/images/islasantarem.svg" alt="ISLA" class="topbar-logo" />
        </div>
        <div class="sec-topbar-title">
          <div class="sec-topbar-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            </svg>
          </div>
          Secretaria Virtual
        </div>
      </div>

      <div class="topbar-right">
        <!-- Dark mode toggle -->
        <button class="topbar-btn" id="darkModeBtn" onclick="toggleDark()" title="Modo escuro">
          <svg id="darkIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome state (shown when no session active) -->
      <div class="sec-welcome" id="welcomeView">
        <div class="sec-welcome-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <h2>Secretaria Virtual ISLA</h2>
        <p>Obtém ajuda com matrículas, propinas, bolsas, calendário académico, certidões e muito mais.</p>
        <div class="sec-suggestions">
          <button class="sec-suggestion" onclick="suggest('Quais são as datas de matrícula?')">Datas de matrícula</button>
          <button class="sec-suggestion" onclick="suggest('Como posso pagar as propinas?')">Pagamento de propinas</button>
          <button class="sec-suggestion" onclick="suggest('Como requerer uma certidão?')">Certidões</button>
          <button class="sec-suggestion" onclick="suggest('Que bolsas de estudo estão disponíveis?')">Bolsas de estudo</button>
          <button class="sec-suggestion" onclick="suggest('Qual é o calendário académico?')">Calendário académico</button>
          <button class="sec-suggestion" onclick="suggest('Como posso contactar a secretaria?')">Contactar secretaria</button>
          <button class="sec-suggestion" onclick="suggest('Quais são os documentos necessários para a candidatura?')">Candidatura</button>
          <button class="sec-suggestion" onclick="suggest('Como funciona o regime de equivalências?')">Equivalências</button>
        </div>
      </div>
      <!-- Chat messages rendered here -->
      <div id="msgList" style="display:none"></div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <!-- Input bar -->
    <div class="input-area">
      <div class="input-wrap" id="inputWrap">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Faz uma pergunta à secretaria..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar (Enter)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span style="font-size:11px; color:var(--text-muted,#999);">
          As respostas são geradas por IA — confirma informações importantes com a secretaria.
        </span>
      </div>
    </div>

  </main>
</div>

<script>
/* ── State ── */
const API   = '/api';
let token   = localStorage.getItem('token') || '';
let user    = null;
let sessions = [];
let currentSessionId = null;
let isStreaming       = false;
let activeStream      = null;

/* ── Auth ── */
async function init() {
  if (!token) { window.location.href = '/'; return; }
  try {
    const r = await apiFetch('/auth/me');
    if (!r.ok) throw new Error();
    user = await r.json();
    document.getElementById('userName').textContent  = user.name;
    document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
    const roleMap = { admin: 'Administrador', instructor: 'Docente', secretaria: 'Secretaria', student: 'Estudante' };
    document.getElementById('userRole').textContent = roleMap[user.role] || user.role;
  } catch {
    localStorage.removeItem('token');
    window.location.href = '/';
    return;
  }
  await loadSessions();
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = '/';
}

function apiFetch(path, opts = {}) {
  opts.headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${token}` };
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  return fetch(API + path, opts);
}

/* ── Sessions ── */
async function loadSessions() {
  const r = await apiFetch('/secretaria/sessions');
  if (!r.ok) return;
  sessions = await r.json();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!sessions.length) {
    list.innerHTML = '<div class="history-empty">Sem conversas anteriores</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession(${s.id})" id="sess-${s.id}">
      <div class="session-title">${escHtml(s.title || 'Conversa')}</div>
      <div class="session-meta">${fmtDate(s.updated_at)}</div>
      <div class="session-actions">
        <button class="session-action-btn" onclick="event.stopPropagation(); deleteSession(${s.id})" title="Apagar">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}

async function loadSession(id) {
  currentSessionId = id;
  renderHistory();
  const r = await apiFetch(`/secretaria/sessions/${id}/messages`);
  if (!r.ok) return;
  const msgs = await r.json();
  showMsgList();
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  msgs.forEach(m => appendMessage(m.role, m.content, m.sources || [], false));
  scrollToBottom();
}

async function deleteSession(id) {
  if (!confirm('Apagar esta conversa?')) return;
  await apiFetch(`/secretaria/sessions/${id}`, { method: 'DELETE' });
  if (currentSessionId === id) newChat();
  await loadSessions();
}

function newChat() {
  currentSessionId = null;
  document.getElementById('msgList').innerHTML = '';
  document.getElementById('msgList').style.display = 'none';
  document.getElementById('welcomeView').style.display = 'flex';
  renderHistory();
}

/* ── Messaging ── */
function suggest(text) {
  document.getElementById('messageInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('messageInput');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.style.height = 'auto';
  showMsgList();
  appendMessage('user', question, [], false);
  setStreaming(true);

  const typingEl = document.getElementById('typingIndicator');
  typingEl.style.display = 'flex';
  scrollToBottom();

  let sessionId = currentSessionId;

  try {
    const r = await apiFetch('/secretaria/message/stream', {
      method: 'POST',
      body: { session_id: sessionId, question },
    });

    if (!r.ok) {
      typingEl.style.display = 'none';
      appendMessage('assistant', 'Erro ao contactar o servidor. Tenta novamente.', [], false);
      setStreaming(false);
      return;
    }

    const reader = r.body.getReader();
    const dec    = new TextDecoder();
    let buf      = '';
    let msgEl    = null;
    let rawText  = '';
    let sources  = [];
    let usedWeb  = false;

    activeStream = reader;
    typingEl.style.display = 'none';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (!payload) continue;
        let ev;
        try { ev = JSON.parse(payload); } catch { continue; }

        if (ev.type === 'meta') {
          if (ev.session_id && !currentSessionId) {
            currentSessionId = ev.session_id;
            sessionId = ev.session_id;
          }
          sources = ev.sources || [];
          usedWeb = ev.used_web || false;
        }

        if (ev.type === 'token') {
          if (!msgEl) {
            msgEl = createStreamingMsg();
          }
          rawText += ev.text;
          updateStreamingMsg(msgEl, rawText);
          scrollToBottom();
        }

        if (ev.type === 'end') {
          if (msgEl) finaliseMsg(msgEl, rawText, sources, usedWeb);
          await loadSessions();
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      typingEl.style.display = 'none';
      appendMessage('assistant', 'A ligação foi interrompida. Tenta novamente.', [], false);
    }
  }

  setStreaming(false);
  activeStream = null;
  scrollToBottom();
}

function setStreaming(v) {
  isStreaming = v;
  document.getElementById('sendBtn').disabled = v;
}

/* ── Message rendering ── */
function showMsgList() {
  document.getElementById('welcomeView').style.display = 'none';
  document.getElementById('msgList').style.display     = 'block';
}

function appendMessage(role, content, sources, streaming) {
  const list = document.getElementById('msgList');
  const div  = document.createElement('div');
  div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (role === 'assistant') {
    const clean = stripMarkers(content);
    const marker = extractMarker(content);
    bubble.innerHTML = renderMd(clean);
    if (!streaming && sources && sources.length) {
      bubble.appendChild(renderSources(sources, marker));
    }
    if (!streaming && marker) {
      bubble.appendChild(renderBadge(marker));
    }
  } else {
    bubble.textContent = content;
  }

  div.appendChild(bubble);
  list.appendChild(div);
  return div;
}

function createStreamingMsg() {
  const list = document.getElementById('msgList');
  const div  = document.createElement('div');
  div.className = 'message assistant-message';
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble streaming-bubble';
  div.appendChild(bubble);
  list.appendChild(div);
  return div;
}

function updateStreamingMsg(div, rawText) {
  const clean = stripMarkers(rawText);
  div.querySelector('.message-bubble').innerHTML = renderMd(clean) + '<span class="cursor-blink">▋</span>';
}

function finaliseMsg(div, rawText, sources, usedWeb) {
  const clean  = stripMarkers(rawText);
  const marker = extractMarker(rawText);
  const bubble = div.querySelector('.message-bubble');
  bubble.classList.remove('streaming-bubble');
  bubble.innerHTML = renderMd(clean);
  if (sources && sources.length) bubble.appendChild(renderSources(sources, marker));
  if (marker) bubble.appendChild(renderBadge(marker));
}

function renderSources(sources, marker) {
  const wrap = document.createElement('div');
  wrap.style.marginTop = '8px';
  sources.forEach(s => {
    const pill = document.createElement('span');
    pill.className = 'source-pill';
    const icon = s.from_web
      ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'
      : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    pill.innerHTML = icon + escHtml(s.label);
    wrap.appendChild(pill);
  });
  return wrap;
}

function renderBadge(marker) {
  const span = document.createElement('div');
  span.style.marginTop = '6px';
  if (marker === 'DOCS') {
    span.innerHTML = '<span class="sec-badge docs">📄 Documentos da Secretaria</span>';
  } else if (marker === 'WEB') {
    span.innerHTML = '<span class="sec-badge web">🌐 Site ISLA Santarém</span>';
  } else {
    span.innerHTML = '<span class="sec-badge geral">💬 Conhecimento Geral</span>';
  }
  return span;
}

function stripMarkers(text) {
  return text.replace(/\[\[FONTE:[A-Z]+\]\]/g, '').trim();
}

function extractMarker(text) {
  const m = text.match(/\[\[FONTE:([A-Z]+)\]\]/);
  return m ? m[1] : null;
}

/* ── Markdown renderer (minimal) ── */
function renderMd(text) {
  let html = escHtml(text);
  // Bold, italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm,  '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm,   '<h2>$1</h2>');
  // Bullet lists
  html = html.replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Line breaks
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

/* ── Utilities ── */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)   return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)} min`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h`;
  return d.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

function toggleDark() {
  const on = document.documentElement.hasAttribute('data-dark');
  if (on) { document.documentElement.removeAttribute('data-dark'); localStorage.setItem('darkMode', '0'); }
  else    { document.documentElement.setAttribute('data-dark', '1'); localStorage.setItem('darkMode', '1'); }
}
